global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: moto-compare-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["app:8080", "host.docker.internal:8080"]

